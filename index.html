<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Rick and Morty</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Rick and Morty -- Personagens</h1>
  <p id="contador"></p>
  <input type="text" id="busca" placeholder="Filtrar por nome...">
  <div id="cards"></div>

  <script>
    let todos = [];

    // Busca os personagens no servidor Express
    async function carregar() {
      const res = await fetch('/personagens');  // URL relativa -- mesmo servidor
      todos = await res.json();
      exibir(todos);
    }

    // Cria um card HTML para cada personagem do array
    function exibir(lista) {
      document.getElementById('contador').textContent = 
        'Exibindo ' + lista.length + ' de ' + todos.length + ' personagens';
      document.getElementById('cards').innerHTML = lista.map(p => `
        <div class="card">
          <img src="${p.image}" alt="${p.name}">
          <div class="info">
            <h3>${p.name}</h3>
            <p><span class="status ${p.status}">${p.status}</span></p>
            <p>${p.species}</p>
          </div>
        </div>
      `).join('');
    }

    // Filtra pelo nome ao digitar
    document.getElementById('busca').addEventListener('input', function() {
      const termo = this.value.toLowerCase();
      exibir(todos.filter(p => p.name.toLowerCase().includes(termo)));
    });

    carregar();
  </script>
</body>
</html>
